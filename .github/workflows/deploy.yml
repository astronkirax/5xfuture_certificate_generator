name: Build and Deploy

# Builds the static site and deploys the contents of dist/ to the VPS over SSH.
# Required repository secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST    - server IP / hostname (e.g. 72.61.245.209)
#   VPS_USER    - SSH user (e.g. root)
#   VPS_SSH_KEY - private SSH deploy key (PEM) whose public key is in the server's authorized_keys
#   VPS_TARGET  - absolute deploy directory on the server (e.g. /var/www/5xfuture-certgen)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy dist/ to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist/."
          target: ${{ secrets.VPS_TARGET }}
          strip_components: 1
          overwrite: true
