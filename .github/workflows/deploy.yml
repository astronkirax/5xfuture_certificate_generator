name: Build and Deploy

# The VPS host drops inbound SSH from cloud/CI IP ranges, so we use a PULL-based
# deploy: this workflow builds the site and publishes dist/ to the `deploy` branch.
# A cron job on the server pulls that branch into the web root (see DEPLOYMENT.md).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish built site to deploy branch
        run: |
          cd dist
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA}"
          git branch -M deploy
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" deploy
